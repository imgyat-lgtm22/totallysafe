name: Build EXE
on: push
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pyinstaller pycryptodome pillow psutil wmi pywin32
      - run: pyinstaller --onefile --console systemhelper.py
      - uses: actions/upload-artifact@v4
        with:
          name: exe
          path: dist/code.exe
